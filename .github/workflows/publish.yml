name: Publish

# Triggers:
#   1. Automatically when a GitHub Release is published (recommended).
#   2. Manually via the "Run workflow" button for ad-hoc publishes.
#
# External secrets required (Settings → Secrets and variables → Actions):
#   NPM_TOKEN  — NPM automation/publish token from https://www.npmjs.com/settings/<user>/tokens
#
# MCP Registry authentication uses GitHub OIDC (no secret needed).
# Ensure the repository has "id-token: write" permission and that the
# GitHub App installed by mcp-publisher has been authorised for this repo.
# See: https://modelcontextprotocol.io/registry/github-actions

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish to NPM"
        type: boolean
        default: true
      publish_mcp:
        description: "Publish to MCP Registry"
        type: boolean
        default: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build artefact (shared between publish jobs)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: Publish to NPM
  # ──────────────────────────────────────────────
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    if: >
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_npm == true)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # When triggered by a release tag (e.g. v1.2.3) align package.json
      # version so the published package matches the tag exactly.
      - name: Sync version from release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 3: Publish to the official MCP Registry
  # Note: always runs after publish-npm so the npm package is live before
  # the registry entry references it. When publish-npm is skipped (e.g.
  # workflow_dispatch with publish_npm=false), this job still runs against
  # the existing npm release. If publish-npm fails, this job is blocked.
  # ──────────────────────────────────────────────
  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [build, publish-npm]
    if: >
      always() &&
      needs.build.result == 'success' &&
      (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') &&
      ((github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_mcp == true))
    permissions:
      id-token: write  # Required for OIDC authentication with the MCP Registry
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sync version in server.json to match the release tag before publishing.
      - name: Sync version in server.json from release tag
        if: github.event_name == 'release'
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          node scripts/sync-server-version.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Install mcp-publisher
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher

      - name: Authenticate to MCP Registry via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
